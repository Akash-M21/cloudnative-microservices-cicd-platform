apiVersion: apps/v1

kind: Deployment


metadata:

 name: products

 namespace: microservices



spec:

 replicas:2


 selector:

  matchLabels:

   app: products



 template:

  metadata:

   labels:

    app: products



  spec:


   imagePullSecrets:


   - name: jfrog-secret



   containers:


   - name: products


     image: hiqode01.jfrog.io/akash-docker/products:latest



     ports:


     - containerPort:3002
