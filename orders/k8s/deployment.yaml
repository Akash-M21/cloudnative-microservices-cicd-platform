apiVersion: apps/v1

kind: Deployment


metadata:

 name: orders

 namespace: microservices



spec:

 replicas: 2


 selector:

  matchLabels:

   app: orders



 template:


  metadata:


   labels:


    app: orders



  spec:


   imagePullSecrets:


   - name: jfrog-secret



   containers:


   - name: orders


     image: hiqode01.jfrog.io/akash-docker/orders:latest


     imagePullPolicy: Always



     ports:


     - containerPort:3003
