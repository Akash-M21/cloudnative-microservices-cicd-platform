apiVersion: apps/v1

kind: Deployment


metadata:

  name: api-gateway

  namespace: microservices



spec:

  replicas: 2


  selector:

    matchLabels:

      app: api-gateway



  template:


    metadata:


      labels:


        app: api-gateway



    spec:


      imagePullSecrets:


      - name: jfrog-secret



      containers:


      - name: api-gateway


        image: hiqode01.jfrog.io/akash-docker/api-gateway:latest


        imagePullPolicy: Always



        ports:


        - containerPort: 3000



        resources:


          requests:


            cpu: "100m"

            memory: "128Mi"



          limits:


            cpu: "500m"

            memory: "512Mi"
