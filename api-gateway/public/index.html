<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CloudNative Microservices Platform</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:
Inter,
system-ui,
Segoe UI,
Roboto,
Arial;

background:#f5f7fb;

color:#1f2937;

}



.header{

background:linear-gradient(135deg,#2563eb,#7c3aed);

color:white;

padding:35px;

text-align:center;

}


.header h1{

margin:0;

font-size:32px;

}



.header p{

opacity:.9;

}





.container{

padding:30px;

max-width:1200px;

margin:auto;

}



.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}




.card{

background:white;

border-radius:18px;

padding:22px;

box-shadow:
0 8px 25px rgba(0,0,0,.08);

transition:.3s;

}



.card:hover{

transform:translateY(-5px);

}




.card h2{

margin-top:0;

}




.status{

display:inline-block;

background:#dcfce7;

color:#166534;

padding:6px 14px;

border-radius:20px;

font-size:14px;

}



button{

background:#2563eb;

color:white;

border:none;

padding:10px 18px;

border-radius:10px;

cursor:pointer;

margin-bottom:10px;

}


button:hover{

background:#1d4ed8;

}



ul{

padding-left:20px;

line-height:1.8;

}



input{

padding:10px;

border:1px solid #ddd;

border-radius:8px;

width:100%;

}



.row{

display:flex;

gap:10px;

}



pre{

background:#111827;

color:#d1fae5;

padding:15px;

border-radius:10px;

overflow:auto;

}



.footer{

text-align:center;

padding:25px;

color:#6b7280;

}



.err{

color:#dc2626;

}



</style>


</head>


<body>


<div class="header">


<h1>
🚀 CloudNative Microservices Platform
</h1>


<p>
Jenkins • Docker • JFrog • Kubernetes • AWS EKS
</p>


</div>





<div class="container">


<div class="grid">



<div class="card">


<h2>👤 Users Service</h2>


<span class="status">
Running
</span>


<br><br>


<button onclick="loadUsers()">
Refresh Users
</button>


<ul id="users">

</ul>


</div>





<div class="card">


<h2>🛒 Products Service</h2>


<span class="status">
Running
</span>


<br><br>


<button onclick="loadProducts()">
Refresh Products
</button>


<ul id="products">

</ul>


</div>





<div class="card">


<h2>📦 Orders Service</h2>


<span class="status">
Running
</span>


<br><br>


<button onclick="loadOrders()">
Refresh Orders
</button>



<ul id="orders">

</ul>



<hr>


<h3>Create Order</h3>


<div class="row">


<input 
id="userId"
placeholder="User ID">


<input
id="productId"
placeholder="Product ID">


</div>


<br>


<button onclick="createOrder()">

Place Order

</button>



<pre id="createOrderResult">

</pre>


</div>





<div class="card">


<h2>💳 Payments Service</h2>


<span class="status">

Running

</span>


<br><br>


<button onclick="loadPayments()">

Refresh Payments

</button>


<ul id="payments">

</ul>


</div>




</div>


</div>




<div class="footer">


CloudNative CI/CD Demo Application


</div>





<script>


async function request(url,options){


const response =
await fetch(url,options);


const text =
await response.text();



try{


return JSON.parse(text);


}

catch{

throw new Error(text);

}


}




async function loadUsers(){


const el=document.getElementById("users");


el.innerHTML="Loading...";


try{


const data=
await request("/api/users");


el.innerHTML=
data.map(
u =>
`<li>
${u.id} - ${u.name}
</li>`
).join("");

}


catch(e){

el.innerHTML=
`<li class="err">${e.message}</li>`;

}


}




async function loadProducts(){


const el=document.getElementById("products");


el.innerHTML="Loading...";


try{


const data=
await request("/api/products");


el.innerHTML=
data.map(
p =>
`<li>
${p.name} - ₹${p.price}
</li>`
).join("");

}


catch(e){

el.innerHTML=
`<li class="err">${e.message}</li>`;

}


}




async function loadOrders(){


const el=document.getElementById("orders");


el.innerHTML="Loading...";


try{


const data=
await request("/api/orders");


el.innerHTML=
data.map(
o =>
`<li>
Order ${o.id} - ${o.status}
</li>`
).join("");

}


catch(e){

el.innerHTML=
`<li class="err">${e.message}</li>`;

}


}





async function loadPayments(){


const el=document.getElementById("payments");


el.innerHTML="Loading...";


try{


const data=
await request("/api/payments");


el.innerHTML=
data.map(
p =>
`<li>
Payment ${p.id} - ₹${p.amount}
</li>`
).join("");

}


catch(e){

el.innerHTML=
`<li class="err">${e.message}</li>`;

}


}





async function createOrder(){


const result=
document.getElementById(
"createOrderResult"
);



result.textContent=
"Submitting...";



const body={

userId:
Number(
document.getElementById("userId").value
),


productId:
Number(
document.getElementById("productId").value
)

};



try{


const response=
await request(
"/api/orders",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:
JSON.stringify(body)

}

);



result.textContent=
JSON.stringify(
response,
null,
2
);


loadOrders();


}


catch(e){


result.textContent=
"Error: "+e.message;


}



}




</script>



</body>

</html>
